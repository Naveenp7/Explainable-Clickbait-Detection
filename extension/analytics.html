<!DOCTYPE html>
<html>
<head>
    <title>Clickbait Analytics</title>
    <script src="chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8fafc; color: #0f172a; padding: 2rem; }
        .container { max-width: 900px; margin: 0 auto; background: #ffffff; padding: 3rem; border-radius: 24px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); border: 1px solid #e2e8f0; }
        h1 { text-align: center; margin-bottom: 2rem; color: #2563eb; font-weight: 800; font-size: 2.5rem; }
        .chart-container { position: relative; height: 400px; width: 100%; background: #f1f5f9; padding: 2rem; border-radius: 16px; margin-bottom: 2rem; }
        .stats-table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 2rem; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; }
        .stats-table th, .stats-table td { padding: 16px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        .stats-table th { background: #f1f5f9; color: #475569; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.05em; }
        .stats-table tr:last-child td { border-bottom: none; }
        .text-red { color: #dc2626; font-weight: bold; }
        .btn-clear { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; padding: 10px 20px; border-radius: 12px; cursor: pointer; float: right; font-weight: 600; transition: all 0.2s ease; }
        .btn-clear:hover { background: #fca5a5; }
    </style>
</head>
<body>
    <div class="container">
        <button id="clearDataBtn" class="btn-clear">Reset Data</button>
        <h1>Wall of Shame: Analytics</h1>
        <p style="text-align:center; color:#94a3b8; margin-bottom: 2rem;">Track which websites serve you the most clickbait based on your browsing history.</p>
        
        <div class="chart-container">
            <canvas id="clickbaitChart"></canvas>
        </div>

        <table class="stats-table">
            <thead>
                <tr>
                    <th>Domain</th>
                    <th>Total Headlines Checked</th>
                    <th>Clickbait Detected</th>
                    <th>Clickbait Percentage</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <script src="analytics.js"></script>
</body>
</html>
